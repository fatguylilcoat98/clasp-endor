name: Baseline CI

# Baseline governance-enforcement CI for the golden master template.
# Most jobs run a standard-library-only Node guard — no application code,
# no database, no network. The config-validation job is the one scoped
# exception: it installs ajv (a pinned devDependency) to validate the
# configuration contract. See docs/governance/baseline-ci.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: baseline-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: Lint / format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax-check scripts
        run: find scripts src -name '*.js' -print0 | xargs -0 -r -n1 node --check
      - name: Format check
        run: node scripts/ci/check-format.js

  migration-discipline:
    name: Migration discipline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/ci/check-migrations.js

  secret-guard:
    name: Secret / env-file guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/ci/check-secrets.js

  no-real-data-guard:
    name: No real-data guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/ci/check-no-real-data.js

  no-archived-sql-guard:
    name: No archived SQL guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/ci/check-no-archived-sql.js

  config-validation:
    name: Configuration contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - run: node scripts/ci/check-config-schema.js

  contamination-guard:
    name: Contamination scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/ci/check-contamination.js

  runtime-boundary-guard:
    name: Runtime boundary guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/ci/check-runtime-boundary.js

  memory-boundary-guard:
    name: Memory boundary guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/ci/check-memory-boundary.js

  companion-boundary-guard:
    name: Companion boundary guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/ci/check-companion-boundary.js

  unit-tests:
    name: Runtime unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - run: node --test tests/runtime/*.test.js tests/memory/*.test.js tests/companion/*.test.js

  integration-tests:
    name: Runtime integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lylo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Apply migrations and create LOGIN roles (GM-16)
        # The integration tests use three connection strings (OQ-16.6):
        #   - DATABASE_URL: bootstrap superuser; resets schema and seeds
        #     fixtures.
        #   - LYLO_RUNTIME_DATABASE_URL: lylo_runtime_login LOGIN role,
        #     IN ROLE lylo_runtime; what boot() uses.
        #   - LYLO_SETUP_DATABASE_URL: lylo_setup_login LOGIN role,
        #     IN ROLE lylo_setup; what the provisioning script uses.
        # Migrations are applied here so the lylo_* base roles exist
        # before we create the LOGIN roles that depend on them. Test
        # files re-apply migrations in their own `before` hooks; the
        # DO/IF EXISTS idempotency in 007 makes that safe.
        env:
          PGPASSWORD: postgres
        run: |
          for f in db/migrations/0*.sql; do
            psql -h localhost -U postgres -d lylo_test -v ON_ERROR_STOP=1 -f "$f"
          done
          # Note on BYPASSRLS: in Postgres, BYPASSRLS is a role
          # attribute that does NOT inherit via role membership. The
          # LOGIN role that gates the provisioning process must carry
          # BYPASSRLS itself, not just inherit grants from the base
          # lylo_setup role. Without it, the seeding INSERTs hit RLS
          # default-deny and fail.
          # GM-17 adds lylo_app_login (memory module). It MUST NOT have
          # BYPASSRLS — the memory module must remain subject to RLS in
          # production paths. (Contrast with lylo_setup_login above,
          # which needs BYPASSRLS to seed bootstrap rows.)
          psql -h localhost -U postgres -d lylo_test -v ON_ERROR_STOP=1 -c "
            DO \$\$ BEGIN
              CREATE ROLE lylo_runtime_login LOGIN PASSWORD 'test' IN ROLE lylo_runtime;
            EXCEPTION WHEN duplicate_object THEN NULL; END \$\$;
            DO \$\$ BEGIN
              CREATE ROLE lylo_setup_login LOGIN PASSWORD 'test' IN ROLE lylo_setup;
            EXCEPTION WHEN duplicate_object THEN NULL; END \$\$;
            ALTER ROLE lylo_setup_login BYPASSRLS;
            DO \$\$ BEGIN
              CREATE ROLE lylo_app_login LOGIN PASSWORD 'test' IN ROLE lylo_app;
            EXCEPTION WHEN duplicate_object THEN NULL; END \$\$;
          "
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lylo_test
          LYLO_RUNTIME_DATABASE_URL: postgres://lylo_runtime_login:test@localhost:5432/lylo_test
          LYLO_SETUP_DATABASE_URL: postgres://lylo_setup_login:test@localhost:5432/lylo_test
          LYLO_APP_DATABASE_URL: postgres://lylo_app_login:test@localhost:5432/lylo_test
        # Serial file execution: each test file's `before` hook resets
        # the schema, so files must not race on the same database.
        run: node --test --test-concurrency=1 tests/integration/*.test.js

  rls-contract:
    name: RLS / privacy contract
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lylo_rls
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run RLS contract suite (synthetic + real schema)
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lylo_rls
        # Serial file execution: each test file's `before` hook resets
        # the schema, so files must not race on the same database.
        run: node --test --test-concurrency=1 tests/rls-contract/run-contract.js tests/rls-contract/run-real.test.js
