name: Baseline CI

# Baseline governance-enforcement CI for the golden master template.
# Most jobs run a standard-library-only Node guard — no application code,
# no database, no network. The config-validation job is the one scoped
# exception: it installs ajv (a pinned devDependency) to validate the
# configuration contract. See docs/governance/baseline-ci.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: baseline-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: Lint / format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax-check scripts
        run: find scripts src -name '*.js' -print0 | xargs -0 -r -n1 node --check
      - name: Format check
        run: node scripts/ci/check-format.js

  migration-discipline:
    name: Migration discipline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/ci/check-migrations.js

  secret-guard:
    name: Secret / env-file guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/ci/check-secrets.js

  no-real-data-guard:
    name: No real-data guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/ci/check-no-real-data.js

  no-archived-sql-guard:
    name: No archived SQL guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/ci/check-no-archived-sql.js

  config-validation:
    name: Configuration contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - run: node scripts/ci/check-config-schema.js

  contamination-guard:
    name: Contamination scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/ci/check-contamination.js

  runtime-boundary-guard:
    name: Runtime boundary guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/ci/check-runtime-boundary.js

  unit-tests:
    name: Runtime unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - run: node --test tests/runtime/*.test.js

  integration-tests:
    name: Runtime integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lylo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lylo_test
        # Serial file execution: each test file's `before` hook resets
        # the schema, so files must not race on the same database.
        run: node --test --test-concurrency=1 tests/integration/*.test.js

  rls-contract:
    name: RLS / privacy contract
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lylo_rls
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run RLS contract suite (synthetic + real schema)
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lylo_rls
        # Serial file execution: each test file's `before` hook resets
        # the schema, so files must not race on the same database.
        run: node --test --test-concurrency=1 tests/rls-contract/run-contract.js tests/rls-contract/run-real.test.js
